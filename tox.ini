[tox]
skipsdist = True
envlist =
    py{310,311,312,313,314}-web3{714,7}
    lint-web3{714,7}
    coverage

[flake8]
max-line-length = 120
exclude = .venv, build, dist, .git, __pycache__, .tox, .github, media, notes, tutorials, .idea, .coverage, .mypy_cache

[isort]
atomic = True
ensure_newline_before_comments = False
force_grid_wrap = 2
force_sort_within_sections = True
include_trailing_comma = True
lines_after_imports = 2
line_length = 120
multi_line_output = 3
order_by_type = False
use_parentheses = True

[testenv]
description = run tests
deps =
    web3714: web3==7.14.0
    web37: web3>=7.14.1,<8.0.0
    pytest
    pytest-asyncio
    pytest-mock
commands =
    python --version
    pip freeze
    pytest tests

[testenv:lint-web3{714,7}]
description = run lint, type and format checks
deps =
    web3714: web3==7.14.0
    web37: web3>=7.14.1,<8.0.0
    basedpyright
    coverage
    flake8
    isort
    pytest
commands =
    python --version
    pip freeze
    basedpyright
    flake8 uniswap_universal_router_decoder
    flake8 tests
    flake8 integration_tests
    isort --check --diff uniswap_universal_router_decoder
    isort --check --diff tests
    isort --check --diff integration_tests

[testenv:coverage]
description = run coverage and output json result
deps =
    web3>=7.14.0,<8.0.0
dependency_groups =
    dev
commands =
    python --version
    pip freeze
    coverage run -m pytest tests
    coverage report -m
    coverage json
